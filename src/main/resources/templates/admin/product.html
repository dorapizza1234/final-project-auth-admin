<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 - 상품 관리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin/sideBar.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; color: #333; }
        .main-content { flex: 1; padding: 30px; background-color: #f8f9fc; min-height: 100vh; }
        .card { border: none; border-radius: 12px; box-shadow: 0 0.15rem 1.75rem rgba(58,59,69,.1); margin-bottom: 20px; padding: 20px; background: white; }
        .chart-wrapper { position: relative; width: 100%; }

        /* stat cards — clickable */
        .stat-card-link {
            display: block; text-decoration: none; color: inherit;
            border-radius: 12px;
            box-shadow: 0 0.15rem 1.75rem rgba(58,59,69,.1);
            padding: 16px 20px;
            background: white;
            transition: transform .15s, box-shadow .15s;
            border-left: 4px solid #dee2e6;
        }
        .stat-card-link:hover { transform: translateY(-2px); box-shadow: 0 0.5rem 2rem rgba(58,59,69,.2); color: inherit; }
        .stat-card-link.border-primary   { border-left-color: #4e73df !important; }
        .stat-card-link.border-warning   { border-left-color: #f6c23e !important; }
        .stat-card-link.border-danger    { border-left-color: #e74a3b !important; }
        .stat-card-link.border-success   { border-left-color: #1cc88a !important; }
        /* active-filter: 카드별 고유 색상 테두리 */
        .stat-card-link.border-primary.active-filter { box-shadow: 0 0 0 3px #4e73df, 0 0.15rem 1.75rem rgba(58,59,69,.1); }
        .stat-card-link.border-warning.active-filter { box-shadow: 0 0 0 3px #f6c23e, 0 0.15rem 1.75rem rgba(58,59,69,.1); }
        .stat-card-link.border-danger.active-filter  { box-shadow: 0 0 0 3px #e74a3b, 0 0.15rem 1.75rem rgba(58,59,69,.1); }
        .stat-card-link.border-success.active-filter { box-shadow: 0 0 0 3px #1cc88a, 0 0.15rem 1.75rem rgba(58,59,69,.1); }

        /* status badges */
        .status-badge { padding: 5px 12px; border-radius: 50px; font-size: 0.75rem; font-weight: 700; }
        .onsale  { background: #e6fcf5; color: #0ca678; }
        .reserve { background: #fff4e6; color: #f76707; }
        .soldout { background: #f1f3f5; color: #868e96; }

        /* table */
        .table { background: white; border-radius: 10px; }
        .table thead th { background: #f8f9fc; color: #858796; font-size: .8rem; text-transform: uppercase; border-bottom: 1px solid #e3e6f0; }
        .bg-light-warning { background: #fffcf0 !important; }
        .bg-light-danger  { background: #fff5f5 !important; }
        .table-warning-subtle { background: #fff9db !important; }

        /* filter banner */
        .filter-active-bar {
            background: linear-gradient(90deg, #4e73df, #36b9cc);
            color: #fff; border-radius: 10px;
            padding: 9px 16px; font-size: .875rem;
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 16px;
        }

        /* pagination */
        .page-link { border-radius: 6px !important; margin: 0 2px; }
        .page-item.active .page-link { background: #4e73df; border-color: #4e73df; }
    </style>
</head>
<body class="d-flex">

<aside th:replace="~{admin/admin_sidebar :: adminSidebar}"></aside>

<main class="main-content">
    <h4 class="mb-4 fw-bold text-gray-800">📦 상품 관리 대시보드</h4>

    <!-- ── 차트 + 통계 카드 ── -->
    <div class="row g-3 mb-4">
        <div class="col-md-5">
            <div class="card h-100">
                <div class="fw-bold mb-3 small text-primary text-uppercase">📈 일별 상품 등록 현황 (최근 7일)</div>
                <div class="chart-wrapper" style="height:220px;"><canvas id="productChart"></canvas></div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card h-100 text-center">
                <div class="fw-bold mb-3 small text-start text-success text-uppercase">🏷️ 카테고리별 비중</div>
                <div class="chart-wrapper" style="height:220px;"><canvas id="categoryChart"></canvas></div>
            </div>
        </div>

        <!-- 클릭 가능한 stat 카드 -->
        <div class="col-md-4">
            <div class="d-flex flex-column gap-2 h-100">
                <!-- 총 등록 -->
                <a th:href="@{/admin/product}" class="stat-card-link border-primary flex-fill py-2 text-center"
                   th:classappend="${(selectedStatus==null or selectedStatus=='') and (selectedFilter==null or selectedFilter=='')} ? ' active-filter' : ''">
                    <div class="text-muted small">총 등록 상품</div>
                    <div class="h5 fw-bold mb-0 text-dark" th:text="${totalProducts + '건'}">0건</div>
                </a>
                <!-- 금지어 의심 -->
                <a href="#" class="stat-card-link border-warning flex-fill py-2 text-center bg-light-warning">
                    <div class="text-muted small">금지어 의심</div>
                    <div class="h5 fw-bold mb-0 text-warning"
                         th:text="${#lists.toList(productList).?[suspect == true].size() + '건'}">0건</div>
                </a>
                <!-- 신고된 상품 (클릭 시 reported 필터) -->
                <a th:href="@{/admin/product(filter='reported')}" class="stat-card-link border-danger flex-fill py-2 text-center bg-light-danger"
                   th:classappend="${selectedFilter=='reported'} ? ' active-filter' : ''">
                    <div class="text-muted small">신고된 상품 <i class="bi bi-funnel-fill ms-1" style="font-size:.7rem;"></i></div>
                    <div class="h5 fw-bold mb-0 text-danger" th:text="${reportCount + '건'}">0건</div>
                </a>
                <!-- 판매중 (클릭 시 판매중 필터) -->
                <a th:href="@{/admin/product(status='판매중')}" class="stat-card-link border-success flex-fill py-2 text-center"
                   th:classappend="${selectedStatus=='판매중'} ? ' active-filter' : ''">
                    <div class="text-muted small text-success">현재 판매중 <i class="bi bi-funnel-fill ms-1" style="font-size:.7rem;"></i></div>
                    <div class="h5 fw-bold mb-0 text-success" th:text="${onsaleCount + '건'}">0건</div>
                </a>
            </div>
        </div>
    </div>

    <!-- ── 필터 활성 배너 ── -->
    <div th:if="${(selectedFilter!=null and selectedFilter!='') or (selectedStatus!=null and selectedStatus!='')}"
         class="filter-active-bar">
        <span>
            <i class="bi bi-funnel-fill me-2"></i>
            <span th:if="${selectedFilter=='reported'}">신고된 상품만 표시 중</span>
            <span th:if="${selectedStatus!=null and selectedStatus!=''}">
                상태 <strong th:text="'['+${selectedStatus}+']'"></strong> 필터 적용 중
            </span>
            &nbsp;— 총 <strong th:text="${filteredTotal}">0</strong>건
        </span>
        <a th:href="@{/admin/product}" class="btn btn-sm btn-light rounded-pill px-3 py-1">✕ 필터 해제</a>
    </div>

    <!-- ── 검색 바 ── -->
    <div class="card py-3 mb-3 border-0 shadow-sm">
        <form th:action="@{/admin/product}" method="get" class="d-flex justify-content-between align-items-center">
            <div class="d-flex gap-2">
                <select name="status" class="form-select form-select-sm" style="width:130px;">
                    <option value=""       th:selected="${selectedStatus==null or selectedStatus==''}">전체 상태</option>
                    <option value="판매중"  th:selected="${selectedStatus=='판매중'}">판매중</option>
                    <option value="예약중"  th:selected="${selectedStatus=='예약중'}">예약중</option>
                    <option value="판매완료" th:selected="${selectedStatus=='판매완료'}">판매완료</option>
                </select>
                <input type="hidden" name="filter" th:value="${selectedFilter}">
                <input type="text" name="keyword" class="form-control form-control-sm"
                       placeholder="상품명 또는 판매자 검색" style="width:250px;">
                <button type="submit" class="btn btn-dark btn-sm px-3">검색</button>
            </div>
            <div class="text-muted small">
                조회 결과 : <span class="fw-bold text-primary" th:text="${filteredTotal}">0</span>개
            </div>
        </form>
    </div>

    <!-- ── 테이블 ── -->
    <div class="card p-0 overflow-hidden border-0 shadow-sm">
        <table class="table table-hover mb-0 text-center align-middle" style="table-layout:fixed;">
            <colgroup>
                <col style="width:56px;">
                <col style="width:16%;">
                <col><!-- 상품명: 남은 너비 -->
                <col style="width:9%;">
                <col style="width:9%;">
                <col style="width:8%;">
                <col style="width:9%;">
                <th:block th:if="${selectedFilter=='reported'}"><col style="width:14%;"></th:block>
                <col style="width:9%;">
            </colgroup>
            <thead>
                <tr>
                    <th>번호</th>
                    <th>판매자</th>
                    <th class="text-start">상품명</th>
                    <th>카테고리</th>
                    <th>판매가격</th>
                    <th>거래상태</th>
                    <th>등록일</th>
                    <th th:if="${selectedFilter=='reported'}" class="text-danger">신고유형</th>
                    <th>관리</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(productList)}">
                    <td th:colspan="${selectedFilter=='reported' ? 9 : 8}" class="py-5 text-muted">해당하는 상품이 없습니다.</td>
                </tr>
                <tr th:each="product, stat : ${productList}"
                    th:classappend="${product.suspect} ? 'table-warning-subtle' : ''">
                    <td class="text-muted small" th:text="${(currentPage-1)*size + stat.count}">1</td>
                    <td class="text-truncate" style="max-width:0;">
                        <small class="fw-bold" th:text="${product.sellerEmail}" th:title="${product.sellerEmail}">email</small>
                    </td>
                    <td class="text-start text-truncate" style="max-width:0;">
                        <span class="fw-bold" th:text="${product.productName}" th:title="${product.productName}">상품명</span>
                        <span th:if="${product.suspect}" class="badge bg-danger ms-1"
                              style="font-size:.65rem;padding:2px 5px;">⚠️ 의심</span>
                    </td>
                    <td><span class="badge bg-light text-dark fw-normal" th:text="${product.categoryName}">카테고리</span></td>
                    <td class="fw-bold text-primary"
                        th:text="${product.productPrice != null and product.productPrice > 0
                            ? #numbers.formatInteger(product.productPrice, 0, 'COMMA') + '원'
                            : '무료나눔'}">0원</td>
                    <td>
                        <span class="status-badge"
                              th:classappend="${product.tradeStatus=='예약중'} ? 'reserve' : (${product.tradeStatus=='판매완료'} ? 'soldout' : 'onsale')"
                              th:text="${product.tradeStatus}">판매중</span>
                    </td>
                    <td th:text="${product.regDate != null ? #dates.format(product.regDate,'yyyy-MM-dd') : ''}"></td>
                    <!-- 신고유형 (reported 필터일 때만) -->
                    <td th:if="${selectedFilter=='reported'}">
                        <div class="d-flex flex-column align-items-center gap-1">
                            <span class="badge bg-danger-subtle text-danger fw-semibold"
                                  style="font-size:.7rem;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"
                                  th:text="${product.reportTypes != null ? product.reportTypes : '기타'}"
                                  th:title="${product.reportTypes}"></span>
                            <small class="text-muted" th:text="${product.reportCount + '건'}"></small>
                            <a th:href="@{/admin/complaint}" class="btn btn-outline-danger rounded-pill"
                               style="font-size:.68rem;padding:2px 8px;">신고보기</a>
                        </div>
                    </td>
                    <td>
                        <a th:href="@{/admin/productDetail(productNo=${product.productNo})}"
                           class="btn btn-sm btn-outline-dark rounded-pill px-3">상세보기</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- ── 페이지네이션 ── -->
    <nav th:if="${totalPages > 0}" class="mt-4">
        <ul class="pagination justify-content-center pagination-sm">
            <li class="page-item" th:classappend="${currentPage==1} ? 'disabled'">
                <a class="page-link shadow-none"
                   th:href="@{/admin/product(page=${currentPage-1},size=${size},status=${selectedStatus},filter=${selectedFilter})}">이전</a>
            </li>
            <li class="page-item"
                th:each="i : ${#numbers.sequence(1, totalPages)}"
                th:classappend="${i==currentPage} ? 'active'">
                <a class="page-link shadow-none"
                   th:href="@{/admin/product(page=${i},size=${size},status=${selectedStatus},filter=${selectedFilter})}"
                   th:text="${i}">1</a>
            </li>
            <li class="page-item" th:classappend="${currentPage==totalPages} ? 'disabled'">
                <a class="page-link shadow-none"
                   th:href="@{/admin/product(page=${currentPage+1},size=${size},status=${selectedStatus},filter=${selectedFilter})}">다음</a>
            </li>
        </ul>
    </nav>
</main>

<script th:inline="javascript">
    const dailyLabels = /*[[${dailyLabels}]]*/ [];
    const dailyData   = /*[[${dailyData}]]*/ [];

    new Chart(document.getElementById('productChart').getContext('2d'), {
        type: 'line',
        data: {
            labels: dailyLabels,
            datasets: [{
                label: '등록 건수', data: dailyData,
                borderColor: '#4e73df',
                backgroundColor: 'rgba(78,115,223,0.1)',
                fill: true, tension: 0.4, pointRadius: 3,
                pointBackgroundColor: '#4e73df'
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                y: { beginAtZero: true, grid: { display: true, drawBorder: false } },
                x: { grid: { display: false } }
            }
        }
    });

    const categoryLabels = /*[[${categoryLabels}]]*/ [];
    const categoryData   = /*[[${categoryData}]]*/ [];

    new Chart(document.getElementById('categoryChart').getContext('2d'), {
        type: 'doughnut',
        data: {
            labels: categoryLabels,
            datasets: [{
                data: categoryData,
                backgroundColor: ['#4e73df','#1cc88a','#36b9cc','#f6c23e','#e74a3b','#858796','#5a5c69'],
                hoverBorderColor: 'rgba(234,236,244,1)',
                borderWidth: 2
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: {
                legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 }, padding: 15 } }
            },
            cutout: '75%'
        }
    });
</script>
</body>
</html>
