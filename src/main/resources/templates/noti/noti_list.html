<!DOCTYPE html>
<html th:replace="~{layout/layout_main :: layout(~{::head}, ~{::main}, ~{::script})}"
      xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <link rel="stylesheet" th:href="@{/css/mypage/mypage.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <title>알림함</title>
    <style>
        .noti-card {
            background: #fff; border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,.07);
            margin-bottom: 10px; padding: 18px 20px;
            display: flex; gap: 14px; align-items: flex-start;
            cursor: pointer; transition: box-shadow .15s;
            text-decoration: none; color: inherit;
        }
        .noti-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.12); }
        .noti-card.unread { border-left: 4px solid #4e73df; background: #f8f9ff; }
        .noti-card.read   { border-left: 4px solid transparent; opacity: .8; }
        .noti-icon {
            width: 42px; height: 42px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; flex-shrink: 0;
        }
        .noti-icon.admin { background: #e8edff; color: #4e73df; }
        .noti-icon.trade { background: #e8fff5; color: #1cc88a; }
        .noti-icon.other { background: #fff3e0; color: #f6c23e; }
        .noti-title { font-weight: 700; font-size: .95rem; color: #2e3750; margin-bottom: 4px; }
        .noti-msg   { font-size: .85rem; color: #555; line-height: 1.5; }
        .noti-date  { font-size: .75rem; color: #aaa; margin-top: 6px; }
        .unread-dot { width: 8px; height: 8px; background: #4e73df; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
        .empty-box  { text-align: center; padding: 60px 0; color: #bbb; }
        .empty-box i { font-size: 3rem; display: block; margin-bottom: 12px; }
    </style>
</head>
<main>
    <div class="mp-container">
        <!-- 마이페이지 사이드바 -->
        <aside class="mp-sidebar">
            <h2 class="mp-sidebar-title">마이페이지</h2>
            <nav class="mp-nav">
                <ul>
                    <li><a th:href="@{/mypage/main}">내 정보</a></li>
                    <li><a th:href="@{/mypage/main}">구매관리</a></li>
                    <li><a th:href="@{/mypage/main}">계좌/배송지 관리</a></li>
                    <li><a th:href="@{/mypage/main}">후기관리</a></li>
                    <li><a th:href="@{/mypage/main}">찜내역</a></li>
                    <li><a th:href="@{/mypage/main}">신고관리</a></li>
                    <li><a th:href="@{/noti/list}" class="active">알림함</a></li>
                </ul>
            </nav>
            <div class="mp-exit-wrap">
                <a href="#" class="mp-exit-btn">탈퇴하기</a>
            </div>
        </aside>

        <!-- 알림 컨텐츠 -->
        <section class="mp-content">
            <div class="mp-section-title" style="display:flex; justify-content:space-between; align-items:center;">
                <span>
                    알림함
                    <span class="badge bg-primary ms-1" th:if="${unreadCount > 0}" th:text="${unreadCount}"></span>
                </span>
                <button class="btn btn-outline-secondary btn-sm" onclick="readAll()"
                        th:disabled="${unreadCount == 0}">
                    <i class="bi bi-check2-all me-1"></i>전체 읽음
                </button>
            </div>
            <span class="text-muted small d-block mb-3" th:text="${#lists.size(notiList)} + '개의 알림'"></span>

            <!-- 알림 없음 -->
            <div class="empty-box" th:if="${#lists.isEmpty(notiList)}">
                <i class="bi bi-bell-slash"></i>
                <p>알림이 없습니다.</p>
            </div>

            <!-- 알림 목록 -->
            <div th:each="noti : ${notiList}">
                <div class="noti-card"
                     th:classappend="${noti.readStatus == 0} ? 'unread' : 'read'"
                     th:attr="data-no=${noti.notiNo}"
                     onclick="markRead(this)">
                    <div class="noti-icon"
                         th:classappend="${noti.notiType == 'ADMIN'} ? 'admin' : (${noti.notiType == 'TRADE'} ? 'trade' : 'other')">
                        <i class="bi"
                           th:classappend="${noti.notiType == 'ADMIN'} ? 'bi-shield-check' : (${noti.notiType == 'TRADE'} ? 'bi-bag-check' : 'bi-bell')"></i>
                    </div>
                    <div style="flex:1;">
                        <div class="noti-title" th:text="${noti.title}"></div>
                        <div class="noti-msg"   th:text="${noti.message}"></div>
                        <div class="noti-date"  th:text="${noti.regDate}"></div>
                    </div>
                    <div class="unread-dot" th:if="${noti.readStatus == 0}"></div>
                </div>
            </div>
        </section>
    </div>
</main>
<script th:inline="javascript">
    /*<![CDATA[*/
    const _ctx = (/*[[@{/}]]*/ '/').replace(/\/$/, '');

    function markRead(card) {
        const notiNo = card.dataset.no;
        if (card.classList.contains('read')) return;
        fetch(_ctx + '/noti/read/' + notiNo, { method: 'POST' })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    card.classList.remove('unread');
                    card.classList.add('read');
                    const dot = card.querySelector('.unread-dot');
                    if (dot) dot.remove();
                    const badge = document.querySelector('.badge.bg-primary');
                    if (badge) {
                        const cur = parseInt(badge.textContent) - 1;
                        if (cur <= 0) badge.remove();
                        else badge.textContent = cur;
                    }
                }
            });
    }

    function readAll() {
        fetch(_ctx + '/noti/readAll', { method: 'POST' })
            .then(r => r.json())
            .then(data => { if (data.success) location.reload(); });
    }
    /*]]>*/
</script>
</html>
